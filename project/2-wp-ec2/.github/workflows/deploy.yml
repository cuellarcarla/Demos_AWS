name: Deploy WordPress EC2

on:
  push:
    branches: [main]
    paths:
      - '2-wp-ec2/**'

env:
  TF_DIR: ./2-wp-ec2/terraform

jobs:
  deploy:
    name: Terraform Apply — WP EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ${{ env.TF_DIR }}

      - name: Print WordPress URL
        run: |
          echo "✅ WordPress accessible a:"
          terraform output -raw wordpress_url
          echo ""
          echo "⏳ Espera ~2min per al primer inici de Docker"
        working-directory: ${{ env.TF_DIR }}
