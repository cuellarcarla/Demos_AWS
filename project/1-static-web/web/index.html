<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>CV Challenge — Demo 🚀</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { text-align: center; padding: 3rem; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    p  { color: #94a3b8; }
    .badge { display: inline-block; margin-top: 1.5rem; padding: 0.4rem 1rem; background: #0ea5e9; border-radius: 999px; font-size: 0.85rem; font-weight: 600; }
    .stack { margin-top: 1.5rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .tag { padding: 0.3rem 0.8rem; background: rgba(255,255,255,0.1); border-radius: 6px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 CV Challenge</h1>
    <p>Web estàtica desplegada automàticament amb GitHub Actions + Terraform + AWS S3</p>
    <div class="badge">✅ Deploy automàtic OK</div>
    <div class="stack">
      <span class="tag">AWS S3</span>
      <span class="tag">Terraform</span>
      <span class="tag">GitHub Actions</span>
    </div>
  </div>
</body>
</html>
